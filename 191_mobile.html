<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#000000"/>
  <title>191</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Montserrat','Arial Black',sans-serif;}
    #noise{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;opacity:0.04;}
    #scanlines{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);}
    #vignette{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,0.75) 100%);}
    #glitch-bar{position:fixed;left:0;width:100%;height:0;background:rgba(28,6,244,0.15);pointer-events:none;z-index:5;opacity:0;}
    .contenedor{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;gap:clamp(20px,4vh,40px);padding:clamp(16px,4vw,40px) 20px;}
    .logo-wrap{position:relative;animation:pulseGlow 4s ease-in-out infinite;}
    .logo{width:clamp(200px,70vw,480px);height:auto;display:block;}
    .logo-glitch-r,.logo-glitch-b{position:absolute;top:0;left:0;width:100%;height:100%;background-size:contain;background-repeat:no-repeat;background-position:center;pointer-events:none;}
    .logo-glitch-r{animation:glitchR 6s infinite;opacity:0;mix-blend-mode:screen;}
    .logo-glitch-b{animation:glitchB 6s infinite;opacity:0;mix-blend-mode:screen;}
    @keyframes glitchR{0%,89%,100%{opacity:0;transform:translate(0,0);}90%{opacity:0.7;transform:translate(-4px,1px);clip-path:inset(20% 0 55% 0);}91%{opacity:0;transform:translate(0,0);}93%{opacity:0.5;transform:translate(3px,-2px);clip-path:inset(60% 0 10% 0);}94%{opacity:0;transform:translate(0,0);}}
    @keyframes glitchB{0%,89%,100%{opacity:0;transform:translate(0,0);}91%{opacity:0.6;transform:translate(4px,-1px);clip-path:inset(20% 0 55% 0);}92%{opacity:0;transform:translate(0,0);}94%{opacity:0.4;transform:translate(-3px,2px);clip-path:inset(60% 0 10% 0);}95%{opacity:0;}}
    @keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 8px rgba(255,255,255,0.06));}50%{filter:drop-shadow(0 0 32px rgba(255,255,255,0.2)) drop-shadow(0 0 60px rgba(28,6,244,0.12));}}
    .frase-wrap{text-align:center;display:flex;align-items:center;justify-content:center;}
    .frase{font-size:clamp(18px,5.5vw,64px);font-weight:900;letter-spacing:0.18em;text-transform:uppercase;color:#1c06f4;white-space:nowrap;overflow:hidden;border-right:3px solid #1c06f4;width:0;animation:typing 2.4s steps(20,end) 0.8s forwards,cursor-blink 0.75s step-end 0.8s 4,cursor-hide 0.75s step-end 3.8s forwards,text-fade 3s ease-in-out 4s infinite;}
    @keyframes typing{from{width:0;}to{width:100%;}}
    @keyframes cursor-blink{0%,100%{border-color:#1c06f4;}50%{border-color:transparent;}}
    @keyframes cursor-hide{to{border-color:transparent;}}
    @keyframes text-fade{0%,100%{opacity:1;}50%{opacity:0.15;}}
    .countdown-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
    .countdown-label{font-size:clamp(8px,2vw,12px);font-weight:900;letter-spacing:0.4em;text-transform:uppercase;color:rgba(255,255,255,0.25);}
    .countdown{display:flex;gap:clamp(8px,2.5vw,28px);align-items:flex-start;}
    .unit{display:flex;flex-direction:column;align-items:center;gap:3px;}
    .digits{font-size:clamp(24px,8vw,62px);font-weight:900;color:#fff;letter-spacing:0.04em;line-height:1;font-variant-numeric:tabular-nums;text-shadow:0 0 20px rgba(28,6,244,0.5);transition:color 0.1s;}
    .digits.flash{color:#1c06f4;}
    .unit-label{font-size:clamp(6px,1.8vw,11px);font-weight:900;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.3);}
    .sep{font-size:clamp(20px,6vw,52px);font-weight:900;color:rgba(28,6,244,0.5);line-height:1;margin-top:2px;animation:sepBlink 1s step-end infinite;}
    @keyframes sepBlink{0%,100%{opacity:1;}50%{opacity:0.1;}}
  </style>

<script>
const nc=document.getElementById('noise'),nCtx=nc.getContext('2d');
function rz(){nc.width=window.innerWidth;nc.height=window.innerHeight;}
rz();window.addEventListener('resize',rz);
function drawNoise(){const w=nc.width,h=nc.height,img=nCtx.createImageData(w,h),d=img.data;for(let i=0;i<d.length;i+=4){const v=Math.random()*255|0;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;}nCtx.putImageData(img,0,0);requestAnimationFrame(drawNoise);}
drawNoise();
const bar=document.getElementById('glitch-bar');
function triggerBar(){const y=Math.random()*window.innerHeight,h=Math.random()*6+2;bar.style.top=y+'px';bar.style.height=h+'px';bar.style.opacity='1';bar.style.transform='translateX('+(Math.random()*10-5)+'px)';setTimeout(()=>{bar.style.opacity='0';},80);setTimeout(triggerBar,Math.random()*3000+1500);}
triggerBar();
const src=document.getElementById('logoImg').src;
document.getElementById('glitchR').style.backgroundImage='url('+src+')';
document.getElementById('glitchB').style.backgroundImage='url('+src+')';
// CONFIGURA TU FECHA AQUÍ: new Date(año, mes-1, día, hora, min, seg)
const target=new Date(2025,11,31,23,59,59);
function pad(n){return String(n).padStart(2,'0');}
let pS=-1,pM=-1,pH=-1,pD=-1;
function flash(id){const el=document.getElementById(id);el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),150);}
function tick(){const diff=Math.max(0,target-new Date()),ts=Math.floor(diff/1000),s=ts%60,m=Math.floor(ts/60)%60,h=Math.floor(ts/3600)%24,d=Math.floor(ts/86400);
if(s!==pS){document.getElementById('cd-s').textContent=pad(s);flash('cd-s');pS=s;}
if(m!==pM){document.getElementById('cd-m').textContent=pad(m);flash('cd-m');pM=m;}
if(h!==pH){document.getElementById('cd-h').textContent=pad(h);flash('cd-h');pH=h;}
if(d!==pD){document.getElementById('cd-d').textContent=pad(d);flash('cd-d');pD=d;}}
tick();setInterval(tick,1000);
</script>

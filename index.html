    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%;
      background:#000;
      overflow:hidden;
      font-family:'Satoshi','Arial Black',sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #noise {
      position:fixed; top:0; left:0;
      width:100%; height:100%;
      pointer-events:none; z-index:1; opacity:0.038;
    }
    #scanlines {
      position:fixed; top:0; left:0; width:100%; height:100%;
      pointer-events:none; z-index:2;
      background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,0.13) 2px,rgba(0,0,0,0.13) 4px);
    }
    #vignette {
      position:fixed; top:0; left:0; width:100%; height:100%;
      pointer-events:none; z-index:3;
      background:radial-gradient(ellipse at center, transparent 28%, rgba(0,0,0,0.88) 100%);
    }
    #glitch-bar {
      position:fixed; left:0; width:100%; height:0;
      background:rgba(28,6,244,0.12);
      pointer-events:none; z-index:5; opacity:0;
    }

    .scene {
      position:relative; z-index:10;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      min-height:100vh; min-height:100dvh;
      gap:clamp(28px,5vh,56px);
      padding:clamp(24px,5vw,60px) clamp(20px,6vw,60px);
    }

    /* ── FRASE ── */
    .frase-wrap {
      text-align:center;
      order:1;
      animation: fraseFade 3.4s ease-in-out 2.2s infinite;
    }

    @keyframes fraseFade {
      0%,100% { opacity:1; }
      50%      { opacity:0.07; }
    }

    .frase-linea {
      display:block;
      font-family:'Satoshi','Arial Black',sans-serif;
      font-size:clamp(48px,12vw,156px);
      font-weight:900;
      line-height:0.93;
      letter-spacing:-0.03em;
      color:#fff;
    }

    .frase-linea.l1 { animation: revealUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.1s both; }
    .frase-linea.l2 { animation: revealUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.35s both; }

    @keyframes revealUp {
      from { opacity:0; transform:translateY(36px); filter:blur(8px); }
      to   { opacity:1; transform:translateY(0);    filter:blur(0); }
    }

    /* "entiendes" con subrayado azul */
    .enfasis {
      position:relative;
      display:inline-block;
    }
    .enfasis::after {
      content:'';
      position:absolute;
      left:0; bottom:-6px;
      height:4px;
      border-radius:2px;
      background:#1c06f4;
      animation: lineReveal 0.7s cubic-bezier(0.22,1,0.36,1) 0.8s both,
                 lineGlow 3.4s ease-in-out 2.2s infinite;
    }

    @keyframes lineReveal {
      from { width:0; opacity:0; }
      to   { width:100%; opacity:1; }
    }

    @keyframes lineGlow {
      0%,100% { box-shadow:0 0 4px rgba(28,6,244,0.4); }
      50%      { box-shadow:0 0 20px rgba(28,6,244,1), 0 0 40px rgba(28,6,244,0.4); }
    }

<script>
  const nc=document.getElementById('noise'),cx=nc.getContext('2d');
  function rz(){nc.width=window.innerWidth;nc.height=window.innerHeight;}
  rz(); window.addEventListener('resize',rz);
  function grain(){
    const w=nc.width,h=nc.height,id=cx.createImageData(w,h),d=id.data;
    for(let i=0;i<d.length;i+=4){const v=Math.random()*255|0;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;}

    bar.style.transform='translateX('+(Math.random()*14-7)+'px)';

  }
